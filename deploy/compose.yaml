name: today-list

services:
  mysql:
    image: mysql:8.4.10
    container_name: today-list-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: today_list
      MYSQL_USER: today_list_app
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_app_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
      - --skip-name-resolve
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    secrets:
      - mysql_app_password
      - mysql_root_password
    networks:
      - backend
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot --password="$$(cat /run/secrets/mysql_root_password)" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: today-list-app:0.3.1
    container_name: today-list-app
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
      TRUST_PROXY: 1
      SESSION_DAYS: 30
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: today_list
      MYSQL_USER: today_list_app
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_app_password
    secrets:
      - mysql_app_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend
      - frontend
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  caddy:
    image: caddy:2.11.4-alpine
    container_name: today-list-caddy
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-:80}
    ports:
      - ${HTTP_PORT:-80}:80
      - ${HTTPS_PORT:-443}:443
      - ${HTTPS_PORT:-443}:443/udp
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

secrets:
  mysql_app_password:
    file: ./secrets/mysql_app_password
  mysql_root_password:
    file: ./secrets/mysql_root_password

volumes:
  mysql_data:
    name: today-list-mysql-data
    external: true
  caddy_data:
    name: today-list-caddy-data
  caddy_config:
    name: today-list-caddy-config

networks:
  backend:
    name: today-list-backend
    internal: true
  frontend:
    name: today-list-frontend
