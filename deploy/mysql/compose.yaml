name: today-list-database

services:
  mysql:
    image: mysql:8.4.10
    container_name: today-list-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: today_list
      MYSQL_USER: today_list_app
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_app_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
      - --skip-name-resolve
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    secrets:
      - mysql_app_password
      - mysql_root_password
    networks:
      - backend
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot --password="$$(cat /run/secrets/mysql_root_password)" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

secrets:
  mysql_app_password:
    file: ./secrets/mysql_app_password
  mysql_root_password:
    file: ./secrets/mysql_root_password

volumes:
  mysql_data:
    name: today-list-mysql-data

networks:
  backend:
    name: today-list-backend
    driver: bridge
